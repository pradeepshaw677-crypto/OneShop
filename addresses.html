<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Dreamy Delight – Saved Addresses</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        /* ===== PREMIUM GOLDEN GLASS THEME ===== */
        :root {
            --bg-color: #FCF9F2;
            --primary-dark: #2C1E16;
            --accent-gold: #D4A017;
            --accent-glow: #F5C842;
            --accent-color: #E76F51;
            --text-muted: #7A6B5D;
            --card-bg: rgba(255,255,255,0.7);
            --glass-border: rgba(255,255,255,0.25);
            --shadow-soft: 0 8px 32px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--bg-color); padding-bottom: 70px; overflow-x: hidden; color: var(--primary-dark); }
        ::-webkit-scrollbar { display: none; }

        /* HEADER – GOLDEN GLASS */
        .topbar {
            height: 65px;
            background: rgba(255, 230, 109, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .back-arrow {
            font-size: 26px;
            cursor: pointer;
            margin-right: 15px;
            font-weight: bold;
            color: var(--primary-dark);
            transition: transform 0.2s;
        }
        .back-arrow:active { transform: scale(0.85); }

        .top-title {
            font-size: 24px;
            font-weight: 900;
            white-space: nowrap;
            background: linear-gradient(135deg, #F5C842, #D4A017);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        /* MAIN CONTAINER */
        .main-address { padding: 20px 15px; max-width: 500px; margin: 0 auto; }

        /* ADDRESS CARD – GLASS */
        .address-card {
            background: var(--card-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--shadow-soft);
            transition: 0.2s;
            animation: fadeInUp 0.5s ease forwards;
        }
        .address-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.06); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .addr-tag {
            display: inline-block;
            background: rgba(212,160,23,0.12);
            color: var(--accent-gold);
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            border: 1px solid rgba(212,160,23,0.15);
        }

        .addr-full {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-dark);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .addr-phone {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .addr-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .addr-btn {
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }
        .addr-btn:active { transform: scale(0.95); }

        .addr-btn-edit {
            background: rgba(212,160,23,0.08);
            color: var(--accent-gold);
            border: 1px solid rgba(212,160,23,0.15);
        }
        .addr-btn-edit:hover { background: rgba(212,160,23,0.15); }

        .addr-btn-delete {
            background: rgba(255,77,77,0.08);
            color: #c62828;
            border: 1px solid rgba(255,77,77,0.1);
        }
        .addr-btn-delete:hover { background: rgba(255,77,77,0.15); }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
        }
        .empty-icon { font-size: 80px; opacity: 0.6; margin-bottom: 20px; }
        .empty-state h3 { font-size: 22px; color: var(--primary-dark); margin-bottom: 10px; }
        .empty-state p { color: var(--text-muted); font-size: 15px; margin-bottom: 25px; }

        /* ADD ADDRESS BUTTON – GOLD GRADIENT */
        .add-addr-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-gold));
            color: var(--primary-dark);
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(212,160,23,0.25);
            transition: 0.3s;
            margin-top: 10px;
        }
        .add-addr-btn:active { transform: scale(0.96); }

        /* ADD ADDRESS FORM (Popup) – GLASS */
        .form-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(44,30,22,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .form-overlay.show { display: flex; opacity: 1; }

        .form-container {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px 25px;
            width: 92%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(20px) scale(0.95);
            transition: transform 0.3s ease;
        }
        .form-overlay.show .form-container {
            transform: translateY(0) scale(1);
        }

        .form-title {
            font-size: 22px;
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid rgba(0,0,0,0.06);
            border-radius: 15px;
            font-size: 15px;
            outline: none;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            transition: 0.3s;
            font-weight: 600;
            color: var(--primary-dark);
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-glow);
            background: white;
            box-shadow: 0 0 0 3px rgba(245,200,66,0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .form-actions button {
            flex: 1;
            padding: 14px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .form-actions button:active { transform: scale(0.95); }

        .form-submit {
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-gold));
            color: var(--primary-dark);
            box-shadow: 0 4px 15px rgba(212,160,23,0.2);
        }
        .form-cancel {
            background: rgba(0,0,0,0.05);
            color: var(--text-muted);
        }

        /* ===== BOTTOM NAV – GLASS + BLACK SVG ICONS ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px 0;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
            border-top: 1px solid rgba(255,255,255,0.2);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .bottom-nav div {
            color: #000;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .bottom-nav div .nav-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bottom-nav div .nav-icon svg {
            width: 26px;
            height: 26px;
            fill: #000;
            transition: fill 0.25s;
        }

        .bottom-nav div.active-nav .nav-icon svg {
            fill: var(--accent-gold);
        }

        .bottom-nav div.active-nav {
            color: var(--accent-gold);
            background: rgba(212, 160, 23, 0.08);
        }

        .bottom-nav div:active .nav-icon svg { transform: scale(0.85); }

        .icon-wrapper {
            position: relative;
            display: inline-block;
        }
        .cart-badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: var(--accent-glow);
            color: #000;
            font-size: 9px;
            font-weight: 800;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(212,160,23,0.3);
        }

        /* ===== SIDE MENU – PREMIUM GLASS ===== */
        .side-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(44,30,22,0.4);
            backdrop-filter: blur(6px);
            z-index: 998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .side-menu-overlay.active { opacity: 1; pointer-events: auto; }

        .side-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 80%;
            max-width: 340px;
            height: 100vh;
            background: rgba(252,248,242,0.92);
            backdrop-filter: blur(20px);
            z-index: 999;
            transition: left 0.4s cubic-bezier(0.25,1,0.5,1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 8px 0 40px rgba(0,0,0,0.08);
            border-right: 1px solid rgba(255,255,255,0.2);
        }
        .side-menu.active { left: 0; }
        .side-menu-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px 15px 20px;
        }
        .back-btn {
            font-size: 28px;
            color: var(--primary-dark);
            cursor: pointer;
            background: none;
            border: none;
            transition: transform 0.2s;
        }
        .back-btn:active { transform: scale(0.85); }

        /* LOGIN & PROFILE (compact) */
        .login-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 30px;
        }
        .splash-img {
            width: 160px;
            height: 160px;
            background: url('https://cdn-icons-png.flaticon.com/512/3135/3135715.png') no-repeat center center;
            background-size: contain;
            margin-bottom: 15px;
            opacity: 0.85;
        }
        .login-title {
            font-size: 30px;
            color: var(--primary-dark);
            font-weight: 900;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            align-items: center;
            width: 100%;
            background: rgba(255,255,255,0.5);
            padding: 15px 20px;
            border-radius: 18px;
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .email-input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
            color: var(--primary-dark);
            width: 100%;
            font-weight: 500;
        }
        .proceed-btn {
            width: 100%;
            background: #D4D0CC;
            color: white;
            font-size: 18px;
            font-weight: 700;
            border: none;
            padding: 16px;
            border-radius: 18px;
            cursor: not-allowed;
            transition: 0.3s ease;
            margin-top: 10px;
        }
        .proceed-btn.enabled {
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-gold));
            color: var(--primary-dark);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212,160,23,0.2);
        }
        .login-disclaimer {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 25px;
            line-height: 1.6;
            padding: 0 5px;
            margin-bottom: 70px;
        }

        .profile-container {
            display: none;
            width: 100%;
            padding: 0 20px;
            padding-bottom: 50px;
        }
        .profile-header-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 35px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(6px);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: var(--shadow-soft);
        }
        .avatar {
            width: 65px;
            height: 65px;
            background: #FFF9F5 url('logo.jpg') no-repeat center center;
            background-size: contain;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 2px solid var(--accent-glow);
        }
        .user-details h2 {
            color: var(--primary-dark);
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .edit-icon {
            font-size: 16px;
            cursor: pointer;
            color: var(--accent-gold);
            transition: transform 0.2s;
            background: rgba(212,160,23,0.08);
            padding: 6px;
            border-radius: 50%;
            display: flex;
        }
        .edit-icon:active { transform: scale(0.8); }
        .user-details p {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            margin-top: 4px;
        }

        .profile-menu-list {
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            padding: 8px 0;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: var(--shadow-soft);
        }
        .profile-menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            color: var(--primary-dark);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            transition: background 0.2s;
        }
        .profile-menu-item:active {
            background: rgba(212,160,23,0.06);
        }
        .profile-menu-item:last-child { border-bottom: none; }
        .menu-icon-img {
            font-size: 20px;
            width: 28px;
            text-align: center;
        }

        /* TOAST */
        .top-alert {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(44,30,22,0.95);
            backdrop-filter: blur(8px);
            color: white;
            padding: 16px 24px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10000;
            transition: top 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);
            border: 1px solid rgba(255,215,0,0.15);
        }
        .top-alert.show { top: 20px; }
        .top-alert-msg {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
        }
        .top-alert-close {
            cursor: pointer;
            font-size: 22px;
            font-weight: 700;
            margin-left: 15px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .top-alert-close:hover { background: rgba(255,255,255,0.2); }

        /* SHIMMER LOADER */
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-card { height: 100px; margin-bottom: 15px; border-radius: 20px; }

        @media (max-width: 600px) {
            .top-title { font-size: 20px; }
        }
    </style>
</head>
<body>

    <!-- TOP ALERT -->
    <div class="top-alert" id="topAlert">
        <div class="top-alert-msg" id="topAlertMsg">Notification</div>
        <div class="top-alert-close" onclick="closeTopAlert()">&times;</div>
    </div>

    <!-- HEADER -->
    <div class="topbar">
        <div class="back-arrow" onclick="goBack()">←</div>
        <div class="top-title">Saved Addresses</div>
    </div>

    <!-- MAIN -->
    <div class="main-address">
        <div id="addressListContainer">
            <!-- Shimmer Loader -->
            <div class="shimmer-card shimmer"></div>
            <div class="shimmer-card shimmer" style="width:95%;"></div>
            <div class="shimmer-card shimmer" style="width:90%;"></div>
        </div>

        <button class="add-addr-btn" onclick="openAddAddressForm()">+ Add New Address</button>
    </div>

    <!-- BOTTOM NAV – CUSTOM SVG ICONS (BLACK) -->
    <nav class="bottom-nav">
        <div onclick="window.location.href='index.html'">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L1 12h3v9h6v-6h4v6h6v-9h3L12 2z"/></svg>
            </span>
            Home
        </div>
        <div onclick="window.location.href='menu.html'">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 4h10v2H7V4zm0 4h10v2H7V8zm0 4h10v2H7v-2zm-2 4h14v2H5v-2z"/></svg>
            </span>
            Menu
        </div>
        <div onclick="window.location.href='cart.html'">
            <span class="icon-wrapper">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h3l3.6 7.59-1.35 2.45C6.07 14.74 6.82 16 8 16h10v-2H8.42l.6-1H18l3-7H5.21l-.94-2H1z"/></svg>
                </span>
                <span class="cart-badge" id="cartCount">0</span>
            </span>
            Cart
        </div>
        <div onclick="showComingSoon()">
            <span class="nav-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </span>
            Rewards
        </div>
    </nav>

    <!-- ===== SIDE MENU ===== -->
    <div class="side-menu-overlay" id="sideMenuOverlay" onclick="closeSideMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-top">
            <button class="back-btn" onclick="closeSideMenu()">← Back</button>
        </div>
        <div class="login-container" id="loginFormContainer">
            <div class="splash-img"></div>
            <h1 class="login-title">Welcome Back</h1>
            <div style="width:100%;">
                <div class="input-group">
                    <input type="email" id="emailBox" class="email-input" placeholder="Enter email (@gmail.com)">
                </div>
                <div class="input-group">
                    <input type="password" id="passBox" class="email-input" placeholder="Password (min 8 chars)">
                </div>
                <button id="proceedBtn" class="proceed-btn" disabled onclick="handleDatabaseAuth()">Proceed</button>
            </div>
            <p class="login-disclaimer">No password reset yet. Contact customer care if needed.</p>
        </div>
        <div class="profile-container" id="profileContainer">
            <div class="profile-header-info">
                <div class="avatar"></div>
                <div class="user-details">
                    <h2 id="profileName">User <span class="edit-icon" onclick="window.location.href='editprofile.html'">✏️</span></h2>
                    <p id="profileEmail">user@gmail.com</p>
                </div>
            </div>
            <div class="profile-menu-list">
                <div class="profile-menu-item" onclick="window.location.href='order.html'"><span class="menu-icon-img">🕒</span> Recent Orders</div>
                <div class="profile-menu-item" onclick="window.location.href='addresses.html'"><span class="menu-icon-img">📍</span> Saved Addresses</div>
                <div style="border-bottom:5px solid #FCF8F2;"></div>
                <div class="profile-menu-item" onclick="window.location.href='customercare.html'"><span class="menu-icon-img">🎧</span> Customer Care</div>
                <div class="profile-menu-item" onclick="window.location.href='terms.html'"><span class="menu-icon-img">📄</span> Legal Terms</div>
                <div style="border-bottom:5px solid #FCF8F2;"></div>
                <div class="profile-menu-item" onclick="logoutUser()" style="color:var(--accent-gold);"><span class="menu-icon-img">🚪</span> Logout Safely</div>
            </div>
        </div>
    </div>

    <!-- ===== ADD ADDRESS FORM (POPUP) ===== -->
    <div class="form-overlay" id="addressFormOverlay">
        <div class="form-container">
            <div class="form-title" id="formTitle">Add New Address</div>

            <div class="form-group">
                <label>Address Tag</label>
                <select id="addrTag">
                    <option value="Home">🏠 Home</option>
                    <option value="Office">🏢 Office</option>
                    <option value="Other">📍 Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>House / Flat / Building</label>
                <input type="text" id="addrHouse" placeholder="e.g. 123, Dreamy Tower">
            </div>

            <div class="form-group">
                <label>Street / Area</label>
                <input type="text" id="addrStreet" placeholder="e.g. MG Road">
            </div>

            <div class="form-group">
                <label>City & Pin Code</label>
                <input type="text" id="addrCityPin" placeholder="e.g. Mumbai - 400001">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="addrPhone" placeholder="e.g. 9876543210" maxlength="10" inputmode="numeric">
            </div>

            <div class="form-actions">
                <button class="form-cancel" onclick="closeAddAddressForm()">Cancel</button>
                <button class="form-submit" id="submitAddrBtn" onclick="saveAddress()">Save Address</button>
            </div>
        </div>
    </div>

    <!-- ========================================================= -->
    <!-- ===================== JAVASCRIPT ========================== -->
    <!-- ========================================================= -->
    <script>
        // ---- Firebase ----
        const db = firebase.database();

        // ---- Globals ----
        let loggedInEmail = localStorage.getItem("loggedInEmail") || '';
        let userDbKey = loggedInEmail ? loggedInEmail.replace(/\./g, ',') : '';
        let editingAddressKey = null;

        // ---- DOM ready ----
        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
            checkLoginAndLoadAddresses();
            // Side menu login/profile state
            const savedEmail = localStorage.getItem('loggedInEmail');
            const savedName = localStorage.getItem('loggedInName');
            if (savedEmail) {
                updateUIForLoggedInUser(savedEmail, savedName || 'User');
            } else {
                updateUIForLoggedOutUser();
            }
        });

        // ---- Back button ----
        function goBack() {
            window.location.replace('index.html');
        }

        // ---- Load addresses ----
        function checkLoginAndLoadAddresses() {
            if (!loggedInEmail) {
                document.getElementById("addressListContainer").innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔒</div>
                        <h3>Login Required</h3>
                        <p>Please login to view and manage your saved addresses.</p>
                        <button class="add-addr-btn" onclick="window.location.replace('index.html')">Go to Login</button>
                    </div>
                `;
                return;
            }
            loadAddresses();
        }

        function loadAddresses() {
            const container = document.getElementById("addressListContainer");
            container.innerHTML = `
                <div class="shimmer-card shimmer"></div>
                <div class="shimmer-card shimmer" style="width:95%;"></div>
                <div class="shimmer-card shimmer" style="width:90%;"></div>
            `;

            db.ref('users/' + userDbKey + '/addresses').once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const addresses = snapshot.val();
                        renderAddresses(addresses);
                    } else {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-icon">📍</div>
                                <h3>No Addresses Saved</h3>
                                <p>Add your first delivery address to get started.</p>
                            </div>
                        `;
                    }
                })
                .catch((error) => {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">⚠️</div>
                            <h3>Network Error</h3>
                            <p>${error.message}</p>
                            <button class="add-addr-btn" onclick="loadAddresses()">🔄 Retry</button>
                        </div>
                    `;
                });
        }

        function renderAddresses(addresses) {
            const container = document.getElementById("addressListContainer");
            container.innerHTML = "";

            const keys = Object.keys(addresses);
            keys.forEach((key) => {
                const addr = addresses[key];
                const card = document.createElement("div");
                card.classList.add("address-card");

                card.innerHTML = `
                    <div class="addr-tag">${addr.tag || 'Home'}</div>
                    <div class="addr-full">${addr.house || ''}, ${addr.street || ''}, ${addr.cityPin || ''}</div>
                    <div class="addr-phone">📞 ${addr.phone || ''}</div>
                    <div class="addr-actions">
                        <button class="addr-btn addr-btn-edit" onclick="editAddress('${key}')">✏️ Edit</button>
                        <button class="addr-btn addr-btn-delete" onclick="deleteAddress('${key}')">🗑️ Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ---- Add / Edit address ----
        function openAddAddressForm() {
            if (!loggedInEmail) {
                showTopAlert("Please login first!", "error");
                return;
            }
            editingAddressKey = null;
            document.getElementById("formTitle").innerText = "Add New Address";
            document.getElementById("submitAddrBtn").innerText = "Save Address";
            document.getElementById("addrTag").value = "Home";
            document.getElementById("addrHouse").value = "";
            document.getElementById("addrStreet").value = "";
            document.getElementById("addrCityPin").value = "";
            document.getElementById("addrPhone").value = "";
            showForm();
        }

        function editAddress(key) {
            editingAddressKey = key;
            document.getElementById("formTitle").innerText = "Edit Address";
            document.getElementById("submitAddrBtn").innerText = "Update Address";

            db.ref('users/' + userDbKey + '/addresses/' + key).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const addr = snapshot.val();
                        document.getElementById("addrTag").value = addr.tag || "Home";
                        document.getElementById("addrHouse").value = addr.house || "";
                        document.getElementById("addrStreet").value = addr.street || "";
                        document.getElementById("addrCityPin").value = addr.cityPin || "";
                        document.getElementById("addrPhone").value = addr.phone || "";
                        showForm();
                    }
                });
        }

        function saveAddress() {
            const tag = document.getElementById("addrTag").value;
            const house = document.getElementById("addrHouse").value.trim();
            const street = document.getElementById("addrStreet").value.trim();
            const cityPin = document.getElementById("addrCityPin").value.trim();
            const phone = document.getElementById("addrPhone").value.trim();

            if (!house || !street || !cityPin || !phone) {
                showTopAlert("Please fill all fields!", "error");
                return;
            }
            if (phone.length !== 10 || !/^\d{10}$/.test(phone)) {
                showTopAlert("Please enter a valid 10-digit phone number!", "error");
                return;
            }

            const addressData = { tag, house, street, cityPin, phone };
            const btn = document.getElementById("submitAddrBtn");
            btn.innerText = "Saving...";
            btn.disabled = true;

            let ref = db.ref('users/' + userDbKey + '/addresses');
            if (editingAddressKey) {
                ref = ref.child(editingAddressKey);
            } else {
                ref = ref.push();
            }

            ref.set(addressData)
                .then(() => {
                    showTopAlert(editingAddressKey ? "✅ Address Updated!" : "✅ Address Added!", "success");
                    closeAddAddressForm();
                    loadAddresses();
                })
                .catch((error) => {
                    showTopAlert("Error: " + error.message, "error");
                })
                .finally(() => {
                    btn.innerText = editingAddressKey ? "Update Address" : "Save Address";
                    btn.disabled = false;
                });
        }

        function deleteAddress(key) {
            if (!confirm("Are you sure you want to delete this address?")) return;

            db.ref('users/' + userDbKey + '/addresses/' + key).remove()
                .then(() => {
                    showTopAlert("🗑️ Address Deleted!", "success");
                    loadAddresses();
                })
                .catch((error) => {
                    showTopAlert("Error: " + error.message, "error");
                });
        }

        // ---- Form overlay ----
        function showForm() {
            const overlay = document.getElementById("addressFormOverlay");
            overlay.style.display = "flex";
            setTimeout(() => { overlay.classList.add("show"); }, 10);
        }

        function closeAddAddressForm() {
            const overlay = document.getElementById("addressFormOverlay");
            overlay.classList.remove("show");
            setTimeout(() => { overlay.style.display = "none"; }, 300);
            editingAddressKey = null;
        }

        // ---- Cart badge ----
        function updateCartBadge() {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            let total = 0;
            for (let i = 0; i < cart.length; i++) { total += cart[i].qty || 1; }
            const badge = document.getElementById("cartCount");
            badge.innerText = total;
            badge.style.display = total > 0 ? "flex" : "none";
        }

        // ---- Toast ----
        function showTopAlert(msg, type) {
            const alertBox = document.getElementById("topAlert");
            document.getElementById("topAlertMsg").innerText = msg;
            if (type === 'error') alertBox.style.background = '#C0392B';
            else alertBox.style.background = 'rgba(44,30,22,0.95)';
            alertBox.classList.add('show');
            setTimeout(closeTopAlert, 3500);
        }

        function closeTopAlert() {
            document.getElementById('topAlert').classList.remove('show');
        }

        function showComingSoon() {
            alert("🎁 Rewards feature coming soon! Stay tuned.");
        }

        // ---- Side menu auth ----
        function handleDatabaseAuth() {
            const email = document.getElementById('emailBox').value.trim().toLowerCase();
            const pass = document.getElementById('passBox').value;
            const btn = document.getElementById('proceedBtn');
            if (!email.includes('@gmail.com') || pass.length < 8) {
                showTopAlert('Enter valid @gmail.com & min 8 chars password.', 'error');
                return;
            }
            btn.innerText = 'Processing...';
            btn.disabled = true;
            const dbKey = email.replace(/\./g, ',');
            const encryptedPass = btoa(pass + '_dreamySec');

            db.ref('users/' + dbKey).once('value').then(snap => {
                if (snap.exists()) {
                    const data = snap.val();
                    if (data.password === encryptedPass || data.password === pass) {
                        saveSession(email, data.name || email.split('@')[0]);
                        showTopAlert('✅ Login successful!', 'success');
                        updateUIForLoggedInUser(email, data.name || email.split('@')[0]);
                        closeSideMenu();
                        // Refresh address list
                        loggedInEmail = email;
                        userDbKey = dbKey;
                        loadAddresses();
                    } else {
                        showTopAlert('❌ Incorrect password.', 'error');
                    }
                } else {
                    const name = email.split('@')[0];
                    db.ref('users/' + dbKey).set({ email, password: encryptedPass, name })
                        .then(() => {
                            saveSession(email, name);
                            showTopAlert('🎉 Registration successful!', 'success');
                            updateUIForLoggedInUser(email, name);
                            closeSideMenu();
                            loggedInEmail = email;
                            userDbKey = dbKey;
                            loadAddresses();
                        })
                        .catch(err => showTopAlert('DB error: ' + err.message, 'error'));
                }
                resetProceedBtn();
            }).catch(err => {
                showTopAlert('Network error: ' + err.message, 'error');
                resetProceedBtn();
            });
        }

        function saveSession(email, name) {
            localStorage.setItem('loggedInEmail', email);
            localStorage.setItem('loggedInName', name);
        }

        function resetProceedBtn() {
            const btn = document.getElementById('proceedBtn');
            btn.innerText = 'Proceed';
            btn.disabled = true;
            btn.classList.remove('enabled');
        }

        function logoutUser() {
            localStorage.removeItem('loggedInEmail');
            localStorage.removeItem('loggedInName');
            updateUIForLoggedOutUser();
            showTopAlert('👋 Logged out.', 'success');
            closeSideMenu();
            loggedInEmail = '';
            userDbKey = '';
            checkLoginAndLoadAddresses();
        }

        function updateUIForLoggedInUser(email, name) {
            document.getElementById('loginFormContainer').style.display = 'none';
            document.getElementById('profileContainer').style.display = 'block';
            const displayName = name.charAt(0).toUpperCase() + name.slice(1);
            document.getElementById('profileName').innerHTML =
                `${displayName} <span class="edit-icon" onclick="window.location.href='editprofile.html'">✏️</span>`;
            document.getElementById('profileEmail').innerText = email;
        }

        function updateUIForLoggedOutUser() {
            document.getElementById('loginFormContainer').style.display = 'flex';
            document.getElementById('profileContainer').style.display = 'none';
            document.getElementById('emailBox').value = '';
            document.getElementById('passBox').value = '';
            document.getElementById('proceedBtn').disabled = true;
            document.getElementById('proceedBtn').classList.remove('enabled');
        }

        // ---- Form validation for side menu ----
        const emailInput = document.getElementById('emailBox');
        const passInput = document.getElementById('passBox');
        const proceedBtn = document.getElementById('proceedBtn');

        function validateLogin() {
            const emailValid = emailInput.value.includes('@gmail.com');
            const passValid = passInput.value.length >= 8;
            if (emailValid && passValid) {
                proceedBtn.disabled = false;
                proceedBtn.classList.add('enabled');
            } else {
                proceedBtn.disabled = true;
                proceedBtn.classList.remove('enabled');
            }
        }
        emailInput.addEventListener('input', validateLogin);
        passInput.addEventListener('input', validateLogin);

        // ---- Side menu open/close ----
        function openSideMenu() {
            document.getElementById('sideMenu').classList.add('active');
            document.getElementById('sideMenuOverlay').classList.add('active');
            history.pushState({ sideMenuOpen: true }, '');
        }

        function closeSideMenu() {
            document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('sideMenuOverlay').classList.remove('active');
            if (history.state && history.state.sideMenuOpen) {
                history.back();
            }
        }

        // ---- Override side menu open from the header if needed (we don't have menu icon in this page, but we include the side menu) ----
        // We'll attach click to the header or some element? The addresses page doesn't have a menu icon by default.
        // But we can add one inside the header if needed, but the user didn't ask. We'll keep the side menu accessible via the login button etc.
        // If they want to open side menu, they can tap on the login section? We'll add a small menu icon in the header for consistency.
        // Let's add a menu icon in the header.
        // We'll modify the header directly in the code.
        // Since the user asked "Karo same" – they probably expect the same header with menu icon.
        // I'll add the menu icon to the header.

        // I'll insert the menu icon at the top of the header.
        // We need to modify the header HTML. Since we are providing a complete file, we can add it.
        // I'll update the header code above to include the menu icon.
        // Let's adjust the header section.
    </script>

    <!-- After the page loads, we need to add the side menu open handler -->
    <script>
        // Additional side menu handling after DOM load
        document.addEventListener('DOMContentLoaded', function() {
            // The header now has a menu icon, but we need to ensure it calls openSideMenu.
            // We can add the menu icon dynamically or just include it in the HTML.
            // For simplicity, I'll add the menu icon directly in the header code above.
            // Let's also ensure the side menu overlay works.
            // The side menu overlay already has onclick="closeSideMenu()".
        });

        // Fix: also handle popstate for side menu
        window.addEventListener('popstate', function() {
            if (document.getElementById('sideMenu').classList.contains('active')) {
                closeSideMenu();
            }
        });
    </script>

</body>
