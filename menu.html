<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <title>Dreamy Delight – Menu</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --bg-color: #FCF9F2;
            --primary-dark: #2C1E16;
            --accent-gold: #D4A017;
            --accent-glow: #F5C842;
            --accent-color: #E76F51;
            --text-muted: #7A6B5D;
            --card-bg: rgba(255,255,255,0.7);
            --glass-border: rgba(255,255,255,0.25);
            --shadow-soft: 0 8px 32px rgba(0,0,0,0.06);
            --discount-color: #E53935;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--bg-color); padding-bottom: 70px; overflow-x: hidden; color: var(--primary-dark); }
        ::-webkit-scrollbar { display: none; }

        .topbar {
            height: 65px;
            background: rgba(255, 230, 109, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .top-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon {
            font-size: 30px;
            cursor: pointer;
            font-weight: bold;
            color: var(--primary-dark);
            transition: transform 0.2s;
        }
        .menu-icon:active { transform: scale(0.85); }

        .top-title {
            font-size: 24px;
            font-weight: 900;
            white-space: nowrap;
            background: linear-gradient(135deg, #F5C842, #D4A017);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        .top-search { flex: 1; display: flex; justify-content: flex-end; margin-left: 15px; }
        .search-input-header {
            width: 100%;
            max-width: 160px;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.05);
            outline: none;
            font-size: 13px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(4px);
            color: var(--primary-dark);
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: 0.2s;
        }
        .search-input-header:focus { border-color: var(--accent-glow); box-shadow: 0 0 0 3px rgba(245,200,66,0.1); }
        .search-input-header::placeholder { color: var(--text-muted); font-weight: normal; }

        .main { display: flex; height: calc(100vh - 65px); overflow: hidden; }

        .food-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 90px;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .food-card {
            background: var(--card-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            margin-bottom: 15px;
            box-shadow: var(--shadow-soft);
            align-items: center;
            padding-right: 12px;
            animation: fadeInUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            transition: 0.2s;
            position: relative;
        }
        .food-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.08); }

        .food-img-container { position: relative; margin: 10px; }
        .food-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
            display: block;
            background: white;
        }
        .food-img:active { transform: scale(0.95); }

        .discount-badge {
            position: absolute;
            top: -5px;
            left: -5px;
            background: var(--discount-color);
            color: white;
            font-size: 11px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 30px;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(229,57,53,0.3);
            border: 2px solid white;
            line-height: 1.2;
            text-align: center;
        }
        .discount-badge small {
            font-size: 8px;
            display: block;
            font-weight: 600;
        }

        .food-content { flex: 1; padding: 10px 0; }
        .food-title { font-size: 16px; font-weight: 700; color: var(--primary-dark); margin-bottom: 4px; line-height: 1.2; }
        .food-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; line-height: 1.3; }

        .food-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }

        .price-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .price-original {
            font-size: 14px;
            color: #999;
            text-decoration: line-through;
            font-weight: 600;
        }
        .price-discounted {
            font-size: 18px;
            font-weight: 900;
            color: var(--discount-color);
        }
        .price-normal {
            font-size: 18px;
            font-weight: 900;
            color: var(--primary-dark);
        }
        .discount-percent-tag {
            background: var(--discount-color);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .add-btn {
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-gold));
            color: var(--primary-dark);
            border: none;
            padding: 8px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(212,160,23,0.2);
            white-space: nowrap;
        }
        .add-btn:active { transform: scale(0.95); }

        .category {
            width: 95px;
            background: rgba(255, 249, 245, 0.4);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            overflow-y: auto;
            padding: 10px 6px;
            border-left: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 90px;
        }

        .cat-box {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 10px 5px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .cat-box:active { transform: scale(0.96); }

        .cat-box img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            aspect-ratio: 1/1;
            border-radius: 50%;
            background: white;
            padding: 2px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.04);
        }

        .cat-box p {
            margin-top: 8px;
            font-weight: 900;
            color: #000;
            font-size: 12px;
            line-height: 1.2;
            word-break: break-word;
        }

        .cat-box.active {
            background: rgba(255, 230, 109, 0.5) !important;
            border-right: 4px solid var(--accent-gold);
            transform: scale(1.05);
        }
        .cat-box.active p { color: var(--accent-gold) !important; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px 0;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
            border-top: 1px solid rgba(255,255,255,0.2);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .bottom-nav div {
            color: #000;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .bottom-nav div .nav-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bottom-nav div .nav-icon svg {
            width: 26px;
            height: 26px;
            fill: #000;
            transition: fill 0.25s;
        }

        .bottom-nav div.active-nav .nav-icon svg {
            fill: var(--accent-gold);
        }

        .bottom-nav div.active-nav {
            color: var(--accent-gold);
            background: rgba(212, 160, 23, 0.08);
        }

        .bottom-nav div:active .nav-icon svg { transform: scale(0.85); }

        .icon-wrapper {
            position: relative;
            display: inline-block;
        }
        .cart-badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: var(--accent-glow);
            color: #000;
            font-size: 9px;
            font-weight: 800;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(212,160,23,0.3);
        }

        /* SIDE MENU (unchanged) */
        .side-menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(44, 54, 63, 0.7); z-index: 998; opacity: 0; pointer-events: none; transition: 0.3s ease-in-out; backdrop-filter: blur(3px); }
        .side-menu-overlay.active { opacity: 1; pointer-events: auto; }
        .side-menu { position: fixed; top: 0; left: -100%; width: 80%; max-width: 320px; height: 100vh; background: var(--bg-color); z-index: 999; transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; overflow-y: auto; box-shadow: 5px 0 25px rgba(0,0,0,0.15); }
        .side-menu.active { left: 0; }
        .side-menu-top { display: flex; justify-content: space-between; align-items: center; padding: 25px 20px 10px 20px; }
        .back-btn { font-size: 26px; color: var(--primary-dark); cursor: pointer; background: none; border: none; }
        .login-container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 30px; }
        .splash-img { width: 180px; height: 180px; background: url('https://cdn-icons-png.flaticon.com/512/3135/3135715.png') no-repeat center center; background-size: contain; margin-bottom: 20px; opacity: 0.9; }
        .login-title { font-size: 28px; color: var(--primary-dark); font-weight: 900; margin-bottom: 30px; letter-spacing: 1px; }
        .input-group { display: flex; align-items: center; width: 100%; background: white; padding: 15px 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); }
        .email-input { border: none; background: transparent; outline: none; font-size: 15px; color: var(--primary-dark); width: 100%; font-weight: bold; }
        .proceed-btn { width: 100%; background: #d9dada; color: white; font-size: 18px; font-weight: bold; border: none; padding: 16px; border-radius: 15px; cursor: not-allowed; transition: 0.3s ease; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .proceed-btn.enabled { background: linear-gradient(135deg, var(--accent-glow), var(--accent-gold)); color: var(--primary-dark); cursor: pointer; box-shadow: 0 4px 15px rgba(212,160,23,0.2); }
        .login-disclaimer { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 25px; line-height: 1.5; padding: 0 5px; }
        .profile-container { display: none; width: 100%; padding: 0 20px; padding-bottom: 50px; }
        .profile-header-info { display: flex; align-items: center; gap: 15px; margin-bottom: 35px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); }
        .avatar { width: 60px; height: 60px; background: #FFF9F5 url('logo.jpg') no-repeat center center; background-size: contain; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid var(--accent-glow); }
        .user-details h2 { color: var(--primary-dark); font-size: 20px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        .edit-icon { font-size: 16px; cursor: pointer; color: var(--accent-gold); transition: transform 0.2s; background: rgba(212,160,23,0.08); padding: 5px; border-radius: 50%; display: flex; }
        .edit-icon:active { transform: scale(0.8); }
        .user-details p { color: var(--text-muted); font-size: 13px; font-weight: bold; margin-top: 4px; }
        .profile-menu-list { display: flex; flex-direction: column; background: white; border-radius: 20px; padding: 10px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); }
        .profile-menu-item { display: flex; align-items: center; gap: 15px; padding: 16px 20px; color: var(--primary-dark); font-size: 15px; font-weight: bold; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.03); transition: background 0.2s; }
        .profile-menu-item:active { background: #FCF9F2; }
        .profile-menu-item:last-child { border-bottom: none; }
        .menu-icon-img { font-size: 20px; width: 25px; text-align: center; }

        .top-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(44, 54, 63, 0.95); backdrop-filter: blur(8px); color: white; padding: 15px 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10000; transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); border: 1px solid rgba(255,215,0,0.15); }
        .top-alert.show { top: 20px; }
        .top-alert-msg { font-size: 14px; font-weight: bold; flex: 1; }
        .top-alert-close { cursor: pointer; font-size: 22px; font-weight: 700; margin-left: 15px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; }

        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(44, 54, 63, 0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); opacity: 0; transition: opacity 0.3s ease; }
        .custom-modal.show { display: flex; opacity: 1; }
        .modal-content { background: white; padding: 30px 20px; border-radius: 25px; text-align: center; width: 80%; max-width: 320px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); transform: translateY(20px) scale(0.95); transition: transform 0.3s ease; }
        .close-modal-btn { background: var(--accent-color); color: white; border: none; padding: 14px 30px; border-radius: 15px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }

        .image-preview-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0, 0, 0, 0.85); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s ease; }
        .image-preview-overlay.show { display: flex; opacity: 1; }
        .image-preview-content { position: relative; width: 90%; max-width: 400px; }
        .image-preview-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); background: white; }
        .image-preview-close { position: absolute; top: -15px; right: -15px; background: #FF0000; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10000; transition: transform 0.2s; }
        .image-preview-close:active { transform: scale(0.85); }

        @media (max-width: 600px) {
            .top-title { font-size: 20px; }
            .food-img { width: 80px; height: 80px; }
            .price-discounted { font-size: 15px; }
            .price-original { font-size: 12px; }
            .price-normal { font-size: 15px; }
        }
    </style>
</head>
<body>

    <!-- TOP ALERT -->
    <div class="top-alert" id="topAlert">
        <div class="top-alert-msg" id="topAlertMsg">Notification</div>
        <div class="top-alert-close" onclick="closeTopAlert()">&times;</div>
    </div>

    <!-- HEADER -->
    <div class="topbar">
        <div class="top-left">
            <span class="menu-icon" onclick="openSideMenu()">☰</span>
            <span class="top-title">Dreamy Delight</span>
        </div>
        <div class="top-search">
            <input class="search-input-header" id="searchInput" placeholder="🔍 Search..." oninput="filterFoods()">
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="food-list" id="foodList"></div>
        <div class="category" id="categorySidebar"></div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <div onclick="window.location.href='index.html'">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2L1 12h3v9h6v-6h4v6h6v-9h3L12 2z"/></svg></span> Home
        </div>
        <div class="active-nav" onclick="window.location.href='menu.html'">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M7 4h10v2H7V4zm0 4h10v2H7V8zm0 4h10v2H7v-2zm-2 4h14v2H5v-2z"/></svg></span> Menu
        </div>
        <div onclick="window.location.href='cart.html'">
            <span class="icon-wrapper">
                <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM1 2v2h3l3.6 7.59-1.35 2.45C6.07 14.74 6.82 16 8 16h10v-2H8.42l.6-1H18l3-7H5.21l-.94-2H1z"/></svg></span>
                <span class="cart-badge" id="cartCount">0</span>
            </span> Cart
        </div>
        <div onclick="showComingSoonModal()">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></span> Rewards
        </div>
    </nav>

    <!-- SIDE MENU (unchanged) -->
    <div class="side-menu-overlay" id="sideMenuOverlay" onclick="closeSideMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-top"><button class="back-btn" onclick="closeSideMenu()">← Back</button></div>
        <div class="login-container" id="loginFormContainer">
            <div class="splash-img"></div>
            <h1 class="login-title">Welcome Back</h1>
            <div style="width:100%;">
                <div class="input-group"><input type="email" id="emailBox" class="email-input" placeholder="Enter email (@gmail.com)"></div>
                <div class="input-group"><input type="password" id="passBox" class="email-input" placeholder="Password (min 8 chars)"></div>
                <button id="proceedBtn" class="proceed-btn" disabled onclick="handleDatabaseAuth()">Proceed</button>
            </div>
            <p class="login-disclaimer">No password reset yet. Contact customer care if needed.</p>
        </div>
        <div class="profile-container" id="profileContainer">
            <div class="profile-header-info">
                <div class="avatar"></div>
                <div class="user-details">
                    <h2 id="profileName">User <span class="edit-icon" onclick="window.location.href='editprofile.html'">✏️</span></h2>
                    <p id="profileEmail">user@gmail.com</p>
                </div>
            </div>
            <div class="profile-menu-list">
                <div class="profile-menu-item" onclick="window.location.href='order.html'"><span class="menu-icon-img">🕒</span> Recent Orders</div>
                <div class="profile-menu-item" onclick="window.location.href='addresses.html'"><span class="menu-icon-img">📍</span> Saved Addresses</div>
                <div style="border-bottom:5px solid #FCF9F2;"></div>
                <div class="profile-menu-item" onclick="window.location.href='customercare.html'"><span class="menu-icon-img">🎧</span> Customer Care</div>
                <div class="profile-menu-item" onclick="window.location.href='terms.html'"><span class="menu-icon-img">📄</span> Legal Terms</div>
                <div style="border-bottom:5px solid #FCF9F2;"></div>
                <div class="profile-menu-item" onclick="logoutUser()" style="color:var(--accent-gold);"><span class="menu-icon-img">🚪</span> Logout Safely</div>
            </div>
        </div>
    </div>

    <!-- IMAGE PREVIEW -->
    <div class="image-preview-overlay" id="imagePreviewOverlay" onclick="closeImagePreview()">
        <div class="image-preview-content" onclick="event.stopPropagation();">
            <img class="image-preview-img" id="previewImage" src="" alt="preview">
            <div class="image-preview-close" onclick="closeImagePreview()">✕</div>
        </div>
    </div>

    <!-- COMING SOON MODAL -->
    <div id="comingSoonModal" class="custom-modal">
        <div class="modal-content">
            <div style="font-size:50px;margin-bottom:10px;">🎁</div>
            <h2 style="color:var(--primary-dark);">Coming Soon!</h2>
            <p style="color:var(--text-muted);font-size:14px;margin:15px 0;">Exciting rewards are on the way. Stay tuned!</p>
            <button class="close-modal-btn" onclick="closeComingSoonModal()">Got It</button>
        </div>
    </div>

    <script>
        // ---- Global variables ----
        let allItems = [];
        let allCategories = [];
        let currentCategory = null;
        const db = firebase.database();

        document.addEventListener('DOMContentLoaded', function() {
            loadCategoriesAndItems();
            updateCartBadge();
            const savedEmail = localStorage.getItem('loggedInEmail');
            const savedName = localStorage.getItem('loggedInName');
            if (savedEmail) {
                updateUIForLoggedInUser(savedEmail, savedName || 'User');
            } else {
                updateUIForLoggedOutUser();
            }
            document.getElementById('searchInput').addEventListener('input', filterFoods);
        });

        // ---- Load categories and items (real-time) ----
        function loadCategoriesAndItems() {
            // Load categories
            db.ref('menu_categories').on('value', snapshot => {
                if (snapshot.exists()) {
                    const val = snapshot.val();
                    allCategories = Array.isArray(val) ? val : Object.values(val);
                } else {
                    allCategories = [];
                }
                // Set default category to first one
                if (allCategories.length > 0 && !currentCategory) {
                    currentCategory = allCategories[0].id;
                }
                renderCategories();
                if (allItems.length) renderFoods();
            });

            // Load products from menu_config (admin panel)
            db.ref('menu_config').on('value', snapshot => {
                if (snapshot.exists()) {
                    const val = snapshot.val();
                    allItems = Array.isArray(val) ? val : Object.values(val);
                } else {
                    allItems = [];
                }
                renderFoods();
                console.log('✅ Products loaded:', allItems.length);
            });
        }

        // ---- Render Categories (NO "ALL") ----
        function renderCategories() {
            const sidebar = document.getElementById('categorySidebar');
            sidebar.innerHTML = '';
            if (allCategories.length === 0) {
                sidebar.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px 0;font-size:12px;">No categories</div>';
                return;
            }
            allCategories.forEach(cat => {
                const box = document.createElement('div');
                box.className = 'cat-box';
                if (cat.id === currentCategory) box.classList.add('active');
                box.dataset.cat = cat.id;
                const imgSrc = cat.img || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
                box.innerHTML = `<img src="${imgSrc}"><p>${cat.name}</p>`;
                box.onclick = () => { selectCategory(cat.id, box); };
                sidebar.appendChild(box);
            });
        }

        // ---- Select Category ----
        function selectCategory(catId, element) {
            document.querySelectorAll('.cat-box').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            currentCategory = catId;
            renderFoods();
        }

        // ---- Render Foods (SIRF CATEGORY-WISE) ----
        function renderFoods() {
            const list = document.getElementById('foodList');
            let filtered = [];

            // Filter by current category only
            if (currentCategory) {
                filtered = allItems.filter(item => item.category === currentCategory);
            } else {
                // If no category selected, show empty (or all if you want — but we want category-wise)
                filtered = [];
            }

            // Apply search
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(item =>
                    (item.title || item.name || '').toLowerCase().includes(searchTerm) ||
                    (item.desc || '').toLowerCase().includes(searchTerm)
                );
            }

            if (filtered.length === 0) {
                list.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:16px;">No items found 😔</div>`;
                return;
            }

            let html = '';
            filtered.forEach((item, index) => {
                const title = item.title || item.name || 'Unnamed';
                const price = item.price || 0;
                const img = item.img || 'https://via.placeholder.com/110';
                const desc = item.desc || '';
                const discount = item.discount || 0;
                const originalPrice = item.originalPrice || price;
                const discountedPrice = discount > 0 ? Math.round(originalPrice * (1 - discount/100)) : price;
                const hasDiscount = discount > 0 && discount < 100;

                let priceHtml = '';
                if (hasDiscount && originalPrice > discountedPrice) {
                    priceHtml = `
                        <div class="price-container">
                            <span class="price-original">₹${originalPrice}</span>
                            <span class="price-discounted">₹${discountedPrice}</span>
                            <span class="discount-percent-tag">${discount}% OFF</span>
                        </div>
                    `;
                } else {
                    priceHtml = `<span class="price-normal">₹${price}</span>`;
                }

                let discountBadgeHtml = '';
                if (hasDiscount) {
                    discountBadgeHtml = `<div class="discount-badge">${discount}%<small>OFF</small></div>`;
                }

                html += `
                    <div class="food-card" style="animation-delay: ${index * 0.05}s;">
                        <div class="food-img-container">
                            <img src="${img}" class="food-img" alt="${title}" onclick="openImagePreview('${img}')" onerror="this.src='https://via.placeholder.com/110'">
                            ${discountBadgeHtml}
                        </div>
                        <div class="food-content">
                            <div class="food-title">${title}</div>
                            ${desc ? `<div class="food-desc">${desc}</div>` : ''}
                            <div class="food-bottom">
                                ${priceHtml}
                                <button class="add-btn" onclick="addToCart('${title}', ${hasDiscount ? discountedPrice : price}, '${img}')">Add</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        // ---- Filter by search ----
        function filterFoods() {
            renderFoods();
        }

        // ---- Add to cart ----
        function addToCart(name, price, image) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            const existing = cart.find(item => item.name === name);
            if (existing) {
                existing.qty = (existing.qty || 1) + 1;
            } else {
                cart.push({ name, price, image, qty: 1 });
            }
            localStorage.setItem('myCart', JSON.stringify(cart));
            updateCartBadge();
            showTopAlert(`✅ ${name} added to cart!`, 'success');
        }

        // ---- Cart badge ----
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('myCart')) || [];
            const total = cart.reduce((sum, item) => sum + (item.qty || 0), 0);
            const badge = document.getElementById('cartCount');
            badge.innerText = total;
            badge.style.display = total > 0 ? 'flex' : 'none';
        }

        // ---- Image preview ----
        function openImagePreview(src) {
            const overlay = document.getElementById('imagePreviewOverlay');
            document.getElementById('previewImage').src = src;
            overlay.classList.add('show');
        }
        function closeImagePreview() {
            document.getElementById('imagePreviewOverlay').classList.remove('show');
        }

        // ---- Auth functions (unchanged) ----
        function handleDatabaseAuth() {
            const email = document.getElementById('emailBox').value.trim().toLowerCase();
            const pass = document.getElementById('passBox').value;
            const btn = document.getElementById('proceedBtn');
            if (!email.includes('@gmail.com') || pass.length < 8) {
                showTopAlert('Enter valid @gmail.com & min 8 chars password.', 'error');
                return;
            }
            btn.innerText = 'Processing...';
            btn.disabled = true;
            const dbKey = email.replace(/\./g, ',');
            const encryptedPass = btoa(pass + '_dreamySec');

            db.ref('users/' + dbKey).once('value').then(snap => {
                if (snap.exists()) {
                    const data = snap.val();
                    if (data.password === encryptedPass || data.password === pass) {
                        saveSession(email, data.name || email.split('@')[0]);
                        showTopAlert('✅ Login successful!', 'success');
                        updateUIForLoggedInUser(email, data.name || email.split('@')[0]);
                        closeSideMenu();
                    } else {
                        showTopAlert('❌ Incorrect password.', 'error');
                    }
                } else {
                    const name = email.split('@')[0];
                    db.ref('users/' + dbKey).set({ email, password: encryptedPass, name })
                        .then(() => {
                            saveSession(email, name);
                            showTopAlert('🎉 Registration successful!', 'success');
                            updateUIForLoggedInUser(email, name);
                            closeSideMenu();
                        })
                        .catch(err => showTopAlert('DB error: ' + err.message, 'error'));
                }
                resetProceedBtn();
            }).catch(err => {
                showTopAlert('Network error: ' + err.message, 'error');
                resetProceedBtn();
            });
        }

        function saveSession(email, name) {
            localStorage.setItem('loggedInEmail', email);
            localStorage.setItem('loggedInName', name);
        }

        function resetProceedBtn() {
            const btn = document.getElementById('proceedBtn');
            btn.innerText = 'Proceed';
            btn.disabled = true;
            btn.classList.remove('enabled');
        }

        function logoutUser() {
            localStorage.removeItem('loggedInEmail');
            localStorage.removeItem('loggedInName');
            updateUIForLoggedOutUser();
            showTopAlert('👋 Logged out.', 'success');
            closeSideMenu();
        }

        function updateUIForLoggedInUser(email, name) {
            document.getElementById('loginFormContainer').style.display = 'none';
            document.getElementById('profileContainer').style.display = 'block';
            const displayName = name.charAt(0).toUpperCase() + name.slice(1);
            document.getElementById('profileName').innerHTML =
                `${displayName} <span class="edit-icon" onclick="window.location.href='editprofile.html'">✏️</span>`;
            document.getElementById('profileEmail').innerText = email;
        }

        function updateUIForLoggedOutUser() {
            document.getElementById('loginFormContainer').style.display = 'flex';
            document.getElementById('profileContainer').style.display = 'none';
            document.getElementById('emailBox').value = '';
            document.getElementById('passBox').value = '';
            document.getElementById('proceedBtn').disabled = true;
            document.getElementById('proceedBtn').classList.remove('enabled');
        }

        // ---- Form validation ----
        const emailInput = document.getElementById('emailBox');
        const passInput = document.getElementById('passBox');
        const proceedBtn = document.getElementById('proceedBtn');

        function validateLogin() {
            const emailValid = emailInput.value.includes('@gmail.com');
            const passValid = passInput.value.length >= 8;
            if (emailValid && passValid) {
                proceedBtn.disabled = false;
                proceedBtn.classList.add('enabled');
            } else {
                proceedBtn.disabled = true;
                proceedBtn.classList.remove('enabled');
            }
        }
        emailInput.addEventListener('input', validateLogin);
        passInput.addEventListener('input', validateLogin);

        // ---- Side menu ----
        function openSideMenu() {
            document.getElementById('sideMenu').classList.add('active');
            document.getElementById('sideMenuOverlay').classList.add('active');
            history.pushState({ sideMenuOpen: true }, '');
        }

        function closeSideMenu(fromPopState) {
            document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('sideMenuOverlay').classList.remove('active');
            if (!fromPopState && history.state && history.state.sideMenuOpen) {
                history.back();
            }
        }

        window.addEventListener('popstate', function() {
            if (document.getElementById('sideMenu').classList.contains('active')) {
                closeSideMenu(true);
            }
        });

        // ---- Toast ----
        function showTopAlert(msg, type) {
            const alertBox = document.getElementById('topAlert');
            document.getElementById('topAlertMsg').innerText = msg;
            if (type === 'error') alertBox.style.background = '#C0392B';
            else alertBox.style.background = 'rgba(44,30,22,0.95)';
            alertBox.classList.add('show');
            setTimeout(closeTopAlert, 3500);
        }

        function closeTopAlert() {
            document.getElementById('topAlert').classList.remove('show');
        }

        // ---- Modal ----
        function showComingSoonModal() {
            const modal = document.getElementById('comingSoonModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeComingSoonModal() {
            const modal = document.getElementById('comingSoonModal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });

        console.log('🍽️ Dreamy Delight – Category-wise Menu Loaded');
    </script>

</body>
</html>
